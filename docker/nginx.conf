events {}

http {
    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name 3-215-236-156.sslip.io;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name 3-215-236-156.sslip.io;

        ssl_certificate /etc/letsencrypt/live/3-215-236-156.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/3-215-236-156.sslip.io/privkey.pem;

        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}